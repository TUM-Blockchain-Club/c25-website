<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="spaceGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#000033" />
      <stop offset="100%" stop-color="#000066" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="200" fill="url(#spaceGradient)" />
  
  <!-- Stars -->
  <circle cx="30" cy="30" r="1.5" fill="white" />
  <circle cx="170" cy="40" r="1" fill="white" />
  <circle cx="20" cy="80" r="1" fill="white" />
  <circle cx="180" cy="70" r="1.5" fill="white" />
  <circle cx="40" cy="160" r="1" fill="white" />
  <circle cx="160" cy="180" r="1" fill="white" />
  
  <!-- Main Computer Icon -->
  <rect x="60" y="80" width="80" height="60" fill="#4A90E2" stroke="#ffffff" stroke-width="2" rx="4" />
  <rect x="65" y="85" width="70" height="35" fill="#000033" />
  <rect x="65" y="125" width="70" height="10" fill="#ffffff" />
  
  <!-- Screen dots/pixels -->
  <circle cx="75" cy="95" r="1" fill="#00ff00" />
  <circle cx="85" cy="95" r="1" fill="#00ff00" />
  <circle cx="95" cy="95" r="1" fill="#00ff00" />
  <circle cx="105" cy="95" r="1" fill="#00ff00" />
  <circle cx="115" cy="95" r="1" fill="#00ff00" />
  <circle cx="125" cy="95" r="1" fill="#00ff00" />
  
  <circle cx="75" cy="105" r="1" fill="#00ff00" />
  <circle cx="85" cy="105" r="1" fill="#00ff00" />
  <circle cx="95" cy="105" r="1" fill="#00ff00" />
  <circle cx="115" cy="105" r="1" fill="#00ff00" />
  <circle cx="125" cy="105" r="1" fill="#00ff00" />
  
  <!-- Company Name -->
  <text x="100" y="170" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Space Computer</text>
</svg>